<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Will you be there?</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Comic Sans MS', 'Arial Rounded MT Bold', sans-serif;
            background-color: #ffd6e8;
            overflow: hidden; /* Prevents scrollbars when button moves */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        /* Moving Hearts Background */
        .heart {
            position: absolute;
            color: #ff66a3;
            font-size: 24px;
            opacity: 0.6;
            animation: float 6s linear infinite;
        }

        @keyframes float {
            0% { transform: translateY(100vh) scale(0.5); opacity: 0; }
            50% { opacity: 0.8; }
            100% { transform: translateY(-10vh) scale(1.5); opacity: 0; }
        }

        /* Card Styles */
        .card {
            background: white;
            border-radius: 30px;
            padding: 40px;
            text-align: center;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            border: 4px solid #ff4d94;
            z-index: 10;
            position: relative;
            max-width: 400px;
            width: 90%;
        }

        .avatar {
            width: 200px;
            height: 200px;
            border-radius: 20px;
            margin-top: -120px; /* Makes the image pop out of the top */
            margin-bottom: 20px;
            object-fit: cover;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        h1 {
            color: #4a3b32;
            font-size: 28px;
            margin-bottom: 30px;
        }

        /* Button Styles */
        .button-container {
            display: flex;
            justify-content: center;
            gap: 20px;
            position: relative;
            height: 60px; /* Keeps container height stable */
        }

        button {
            border: none;
            border-radius: 30px;
            padding: 15px 40px;
            font-size: 24px;
            font-weight: bold;
            color: white;
            cursor: pointer;
            transition: transform 0.1s;
        }

        #yes-btn {
            background-color: #ff4d94;
            box-shadow: 0 5px 0 #cc3a75;
        }

        #yes-btn:active {
            transform: translateY(5px);
            box-shadow: 0 0 0 #cc3a75;
        }

        #no-btn {
            background-color: #7a7571;
            box-shadow: 0 5px 0 #5a5551;
            position: relative; /* Starts normal, changes to absolute via JS */
        }

        /* Happy State (Hidden initially) */
        #happy-state {
            display: none;
            text-align: center;
            z-index: 10;
        }
        
        .confetti {
            font-size: 40px;
            margin: 10px;
        }
    </style>
</head>
<body>

    <!-- Background Hearts -->
    <div id="hearts-container"></div>

    <!-- SAD STATE (Initial Page) -->
    <div class="card" id="sad-state">
        <!-- Replace this URL with your actual sad girl image -->
        <video class="avatar" autoplay muted loop playsinline>
            <source src="sadgirl.mp4" type="video/mp4">
        </video>        
        <h1>Will you be there on my graduation day? 🥺🎓</h1>
        
        <div class="button-container">
            <button id="yes-btn">Yes</button>
            <button id="no-btn">No</button>
        </div>
    </div>

    <!-- HAPPY STATE (After clicking Yes) -->
    <div class="card" id="happy-state">
        <!-- Replace this URL with your actual happy girl image -->
        <video class="avatar" autoplay muted loop playsinline>
            <source src="happygirl.mp4" type="video/mp4">
        </video>
        <h1>Yay! I can't wait! 🥰🎓✨</h1>
        <div class="confetti">🎉💖🎊</div>
    </div>

    <script>
        // 1. Generate Moving Hearts Background
        const heartsContainer = document.getElementById('hearts-container');
        for (let i = 0; i < 30; i++) {
            let heart = document.createElement('div');
            heart.innerHTML = '❤';
            heart.classList.add('heart');
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.animationDuration = (Math.random() * 3 + 3) + 's';
            heart.style.animationDelay = Math.random() * 5 + 's';
            heartsContainer.appendChild(heart);
        }

        // 2. Make the "No" button run away
        const noBtn = document.getElementById('no-btn');
        
        // Triggers when mouse hovers over it or taps on mobile
        noBtn.addEventListener('mouseover', moveButton);
        noBtn.addEventListener('touchstart', moveButton);

        function moveButton(e) {
            // Change position to absolute so it breaks out of the layout
            noBtn.style.position = 'fixed';
            
            // Calculate random coordinates within the window
            const maxX = window.innerWidth - noBtn.offsetWidth - 20;
            const maxY = window.innerHeight - noBtn.offsetHeight - 20;
            
            const randomX = Math.max(20, Math.random() * maxX);
            const randomY = Math.max(20, Math.random() * maxY);
            
            noBtn.style.left = randomX + 'px';
            noBtn.style.top = randomY + 'px';
        }

        // 3. Switch to Happy Page when "Yes" is clicked
        const yesBtn = document.getElementById('yes-btn');
        const sadState = document.getElementById('sad-state');
        const happyState = document.getElementById('happy-state');

        yesBtn.addEventListener('click', () => {
            sadState.style.display = 'none';
            happyState.style.display = 'block';
            
            // Optional: Change background color to something more celebratory
            document.body.style.backgroundColor = '#fff0f5';
        });
    </script>
</body>
</html>
